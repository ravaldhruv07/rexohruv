<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#f6f4ee" />
    <meta name="description" content="A calm, private, evidence-based pregnancy and newborn plan." />
    <title>Pregnancy Plan</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23c2624f' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="gate" id="gate">
      <form class="gate-panel" id="gate-form">
        <p class="eyebrow">A private space</p>
        <h1>Pregnancy Plan</h1>
        <p class="gate-tagline">A calm, evidence-based guide for the months ahead.</p>
        <label for="passcode">Passcode</label>
        <div class="gate-row">
          <input id="passcode" name="passcode" type="password" autocomplete="current-password" />
          <button id="unlock-button" type="submit">Unlock</button>
        </div>
        <p class="gate-error" id="gate-error" aria-live="polite"></p>
        <p class="gate-note">A simple passcode keeps this planner just for the two of you.</p>
      </form>
    </div>

    <div class="app" id="app" hidden>
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Ontario · Canada</p>
          <h1>Pregnancy Plan</h1>
          <p id="updated"></p>
        </div>

        <nav class="module-nav" id="module-nav" aria-label="Planner modules"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Your week-by-week plan</p>
            <h2 id="view-title">Timeline</h2>
          </div>
          <div class="actions">
            <button id="print-button" type="button">Print</button>
            <button id="lock-button" type="button">Lock</button>
          </div>
        </header>

        <section class="controls" aria-label="Planner controls">
          <div class="field search-field">
            <label for="search">Search</label>
            <input id="search" type="search" placeholder="screening, sleep, car seat..." />
          </div>
          <div class="field">
            <label for="category-filter">Category</label>
            <select id="category-filter"></select>
          </div>
          <div class="field">
            <label for="kind-filter">Type</label>
            <select id="kind-filter"></select>
          </div>
        </section>

        <section class="view-tabs" aria-label="View selection">
          <button class="tab is-active" data-view="timeline" type="button">Timeline</button>
          <button class="tab" data-view="modules" type="button">Modules</button>
          <button class="tab" data-view="reference" type="button">Reference</button>
        </section>

        <section class="status-strip" id="status-strip"></section>

        <section class="content-view" id="timeline-view"></section>
        <section class="content-view" id="modules-view" hidden></section>
        <section class="content-view" id="reference-view" hidden></section>
      </main>
    </div>

    <script src="planner-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
